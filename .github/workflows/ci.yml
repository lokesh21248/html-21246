name: CI Testing Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Environment Variables
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'test-anon' }}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-key' }}" >> .env

      - name: Validate Environment Variables
        run: |
          chmod +x scripts/check-env.sh
          ./scripts/check-env.sh

      - name: Install Frontend Dependencies
        run: npm ci || npm install   # npm ci preferred if package-lock is in sync

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Run Backend API Tests
        working-directory: ./backend
        run: npm run test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-anon' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-key' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'test-resend' }}
          NODE_ENV: test

      - name: Build Frontend
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Frontend E2E Tests
        run: npm run test:e2e
        
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
